name: Infrastructure Analysis & Risk Intelligence

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-pr-review.yaml'
  workflow_dispatch:

jobs:
  infrastructure-analysis:
    name: Security & Cost Analysis
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ====================================================================
      # SETUP TOOLS & DEPENDENCIES
      # ====================================================================

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # FIX: anthropic SDK is now in requirements.txt — no separate install step needed
          pip install -r scripts/requirements.txt

      - name: Install Checkov
        run: pip install checkov

      - name: Install Infracost
        run: |
          curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh
          # FIX: use 'sh' not 'bash', and verify the binary is on PATH before continuing
          echo "$HOME/.infracost/bin" >> $GITHUB_PATH

      # ====================================================================
      # SECURITY ANALYSIS — CHECKOV
      # ====================================================================

      - name: Run Checkov Security Analysis
        id: checkov
        # FIX: continue-on-error: true so a failing scan does not abort the AI step
        continue-on-error: true
        run: |
          echo "Running Checkov security analysis..."
          # Scan both the root terraform directory and any nested modules
          checkov -d terraform/ --framework terraform -o json --output-file checkov-output.json 2>&1 || true

          # Validate JSON output — create a safe default if Checkov produced no file or invalid JSON
          if [ ! -f checkov-output.json ] || ! jq empty checkov-output.json 2>/dev/null; then
            echo "Checkov output is not valid JSON — creating safe default"
            echo '{"results": {"failed_checks": [], "passed_checks": []}}' > checkov-output.json
          fi

          FAILED=$(jq '.results.failed_checks | length' checkov-output.json 2>/dev/null || echo "0")
          PASSED=$(jq '.results.passed_checks | length' checkov-output.json 2>/dev/null || echo "0")
          echo "checkov_failed=$FAILED" >> $GITHUB_OUTPUT
          echo "checkov_passed=$PASSED" >> $GITHUB_OUTPUT
          echo "Checkov: $FAILED failed, $PASSED passed"
        shell: bash

      # ====================================================================
      # COST ANALYSIS — INFRACOST
      # ====================================================================

      - name: Run Infracost Cost Analysis
        id: infracost
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
        run: |
          echo "Running Infracost cost analysis..."

          if command -v infracost &> /dev/null; then
            infracost breakdown --path terraform/ --format json > infracost-output.json 2>&1 || true

            # Validate — fall back to empty output if infracost failed
            if ! jq empty infracost-output.json 2>/dev/null; then
              echo '{"totalMonthlyCost": 0, "projects": []}' > infracost-output.json
            fi

            TOTAL_COST=$(jq '.totalMonthlyCost // "0"' infracost-output.json 2>/dev/null || echo "0")
            echo "infracost_total=$TOTAL_COST" >> $GITHUB_OUTPUT
            echo "Infracost monthly cost: $TOTAL_COST"
          else
            echo "Infracost binary not found — creating empty output"
            echo '{"totalMonthlyCost": 0, "projects": []}' > infracost-output.json
            echo "infracost_total=0" >> $GITHUB_OUTPUT
          fi
        shell: bash

      # ====================================================================
      # VALIDATE FILES BEFORE AI STEP
      # ====================================================================

      - name: Validate Analysis Files
        run: |
          for f in checkov-output.json infracost-output.json; do
            if [ ! -f "$f" ] || ! jq empty "$f" 2>/dev/null; then
              echo "Creating safe default for $f"
              case "$f" in
                checkov-output.json)
                  echo '{"results": {"failed_checks": [], "passed_checks": []}}' > "$f" ;;
                infracost-output.json)
                  echo '{"totalMonthlyCost": 0, "projects": []}' > "$f" ;;
              esac
            fi
          done
          echo "All required files validated"
        shell: bash

      # ====================================================================
      # AI-POWERED DEEP ANALYSIS — CLAUDE
      # FIX: switched from Gemini (broken model names) to Claude via Anthropic SDK
      # ====================================================================

      - name: Run Deep Analysis (Claude AI)
        id: deep_analysis
        env:
          # FIX: was GEMINI_API_KEY — now uses ANTHROPIC_API_KEY
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Running AI-powered deep analysis with Claude..."

          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ERROR: ANTHROPIC_API_KEY not set"
            echo "Add ANTHROPIC_API_KEY to GitHub repository secrets"
            # Write a minimal report so the PR comment step still runs
            echo "# Infrastructure Analysis\n\nANTHROPIC_API_KEY not configured — AI analysis skipped." \
              > infrastructure-analysis-report.md
            exit 0
          fi

          python scripts/local.py
          echo "Deep analysis complete"
        shell: bash

      # ====================================================================
      # POST SUMMARY COMMENT TO PR
      # ====================================================================

      - name: Post Summary Comment to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reportPath = 'infrastructure-analysis-report.md';
            if (!fs.existsSync(reportPath)) {
              console.log('No report file found — skipping PR comment.');
              return;
            }

            const report = fs.readFileSync(reportPath, 'utf8');

            // FIX: truncate cleanly on a section boundary, not mid-byte
            const maxLength = 64000;
            let body = report;
            if (report.length > maxLength) {
              let cutoff = report.lastIndexOf('\n---\n', maxLength);
              if (cutoff === -1) cutoff = report.lastIndexOf('\n', maxLength);
              body = report.substring(0, cutoff > 0 ? cutoff : maxLength)
                + '\n\n**[Report truncated — see workflow artifacts for full details]**';
            }

            // Delete previous bot comment if present (avoids stacking duplicate comments)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.user.type === 'Bot' && c.body.includes('Infrastructure Analysis')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      # ====================================================================
      # POST INLINE REVIEW COMMENTS (Files Changed tab)
      # ====================================================================

      - name: Post Inline Review Comments to Files Changed
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const inlinePath = 'inline-comments.json';
            if (!fs.existsSync(inlinePath)) {
              console.log('No inline-comments.json — skipping.');
              return;
            }

            const comments = JSON.parse(fs.readFileSync(inlinePath, 'utf8'));
            if (!comments.length) { console.log('No inline comments.'); return; }

            // Files actually changed in this PR
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const changedPaths = new Set(files.map(f => f.filename));

            // Latest commit SHA on the PR branch
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const commitId = pr.head.sha;

            // Map from file path -> patch string for diff-position lookup
            const patchMap = Object.fromEntries(
              files.filter(f => f.patch).map(f => [f.filename, f.patch])
            );

            function getDiffPosition(patch, targetLine) {
              let diffPos = 0, newLine = 0;
              for (const l of patch.split('\n')) {
                diffPos++;
                if (l.startsWith('@@')) {
                  const m = l.match(/\+(\d+)/);
                  if (m) newLine = parseInt(m[1]) - 1;
                  continue;
                }
                if (!l.startsWith('-')) newLine++;
                if (newLine === targetLine && !l.startsWith('-')) return diffPos;
              }
              return null;
            }

            let posted = 0, skipped = 0;

            for (const c of comments) {
              let path = c.path;

              // Normalise path: try as-is, then strip a leading directory segment
              if (!changedPaths.has(path)) {
                const bare = path.replace(/^[^/]+\//, '');
                if (changedPaths.has(bare)) path = bare;
                else { skipped++; continue; }
              }

              const position = getDiffPosition(patchMap[path] || '', c.line);
              if (!position) { skipped++; continue; }

              try {
                await github.rest.pulls.createReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  commit_id: commitId,
                  path,
                  position,
                  body: c.body,
                });
                posted++;
              } catch (err) {
                console.log(`  Skip ${path}:${c.line} — ${err.message}`);
                skipped++;
              }
            }
            console.log(`Inline comments: ${posted} posted, ${skipped} skipped.`);

      # ====================================================================
      # UPLOAD ARTIFACTS
      # ====================================================================

      - name: Upload Analysis Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-analysis-reports
          path: |
            checkov-output.json
            infracost-output.json
            infrastructure-analysis-report.md
            infrastructure-analysis-report.json
            infrastructure-analysis-summary.txt
            inline-comments.json
          retention-days: 30

      # ====================================================================
      # STEP SUMMARY
      # ====================================================================

      - name: Summary
        if: always()
        run: |
          {
            echo "## Infrastructure Analysis Summary"
            echo ""
            echo "### Checkov Security Analysis"
            echo "- Failed checks: ${{ steps.checkov.outputs.checkov_failed }}"
            echo "- Passed checks: ${{ steps.checkov.outputs.checkov_passed }}"
            echo ""
            echo "### Infracost Cost Analysis"
            echo "- Monthly cost estimate: \$${{ steps.infracost.outputs.infracost_total }}"
            echo ""
            echo "### AI Deep Analysis (Claude)"
            if [ -f infrastructure-analysis-report.md ]; then
              echo "- Report generated successfully"
            else
              echo "- Report generation skipped (check ANTHROPIC_API_KEY)"
            fi
            echo ""
            echo "### Artifacts"
            echo "- All reports available in workflow artifacts for 30 days"
          } >> $GITHUB_STEP_SUMMARY