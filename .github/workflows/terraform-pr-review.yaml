name: Infrastructure Analysis & Risk Intelligence

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-pr-review.yaml'
  workflow_dispatch:

jobs:
  infrastructure-analysis:
    name: Security & Cost Analysis
    runs-on: ubuntu-latest
    
    permissions:
      pull-requests: write
      contents: read
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ====================================================================
      # SETUP TOOLS & DEPENDENCIES
      # ====================================================================
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          pip install google-genai

      - name: Install Checkov
        run: pip install checkov

      - name: Install Infracost
        run: |
          curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | bash || true
          infracost --version || echo "⚠ Infracost installation may have failed - will attempt to run"

      # ====================================================================
      # SECURITY ANALYSIS - CHECKOV
      # ====================================================================
      
      - name: Run Checkov Security Analysis
        id: checkov
        run: |
          echo "🔍 Running Checkov security analysis..."
          checkov -d terraform/ --framework terraform -o json 2>&1 | tee checkov-output.json || true
          
          # Validate JSON output
          if ! jq empty checkov-output.json 2>/dev/null; then
            echo "⚠ Checkov output is not valid JSON, creating empty report"
            echo '{"results": {"failed_checks": [], "passed_checks": []}}' > checkov-output.json
          fi
          
          echo "✓ Checkov analysis complete"
          
          # Count findings
          FAILED=$(jq '.results.failed_checks | length' checkov-output.json 2>/dev/null || echo "0")
          PASSED=$(jq '.results.passed_checks | length' checkov-output.json 2>/dev/null || echo "0")
          echo "checkov_failed=$FAILED" >> $GITHUB_OUTPUT
          echo "checkov_passed=$PASSED" >> $GITHUB_OUTPUT
        shell: bash

      - name: Display Checkov Summary
        run: |
          echo "📊 Checkov Results:"
          echo "  Failed checks: ${{ steps.checkov.outputs.checkov_failed }}"
          echo "  Passed checks: ${{ steps.checkov.outputs.checkov_passed }}"

      # ====================================================================
      # COST ANALYSIS - INFRACOST
      # ====================================================================
      
      - name: Configure Infracost API Key
        run: |
          if [ -z "${{ secrets.INFRACOST_API_KEY }}" ]; then
            echo "⚠ Warning: INFRACOST_API_KEY not set - cost analysis will be limited"
          fi
      
      - name: Run Infracost Cost Analysis
        id: infracost
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
        run: |
          echo "💰 Running Infracost cost analysis..."
          
          # Try to run infracost, but don't fail if not available
          if command -v infracost &> /dev/null; then
            infracost breakdown --path terraform/ --format json > infracost-output.json 2>&1 || true
            TOTAL_COST=$(jq '.totalMonthlyCost // 0' infracost-output.json 2>/dev/null || echo "0")
            echo "infracost_total=$TOTAL_COST" >> $GITHUB_OUTPUT
            echo "✓ Infracost analysis complete"
          else
            echo "⚠ Infracost not available - creating empty output"
            echo '{"totalMonthlyCost": 0, "projects": []}' > infracost-output.json
            echo "infracost_total=0" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Display Infracost Summary
        run: |
          echo "💸 Infracost Results:"
          echo "  Total monthly cost: \$${{ steps.infracost.outputs.infracost_total }}"

      # ====================================================================
      # AI-POWERED DEEP ANALYSIS - GEMINI
      # ====================================================================
      
      - name: Validate Analysis Files
        run: |
          echo "✓ Validating analysis output files..."
          
          if [ ! -f checkov-output.json ] || ! jq empty checkov-output.json 2>/dev/null; then
            echo "⚠ Creating default checkov-output.json"
            echo '{"results": {"failed_checks": [], "passed_checks": []}}' > checkov-output.json
          fi
          
          if [ ! -f infracost-output.json ] || ! jq empty infracost-output.json 2>/dev/null; then
            echo "⚠ Creating default infracost-output.json"
            echo '{"totalMonthlyCost": 0, "projects": []}' > infracost-output.json
          fi
          
          echo "✓ All required files validated"
        shell: bash

      - name: Run Deep Analysis (Gemini + AI)
        id: deep_analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🧠 Running AI-powered deep analysis..."
          
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "❌ Error: GEMINI_API_KEY not set"
            echo "Please add GEMINI_API_KEY to GitHub secrets"
            exit 0  # Don't fail - allow workflow to continue for other checks
          fi
          
          python scripts/local.py
          
          echo "✓ Deep analysis complete"
        shell: bash

      # ====================================================================
      # GENERATE & POST REPORT
      # ====================================================================
      
      - name: Read Analysis Report
        id: read_report
        if: success()
        run: |
          if [ -f infrastructure-analysis-report.md ]; then
            echo "report_exists=true" >> $GITHUB_OUTPUT
            # Read report and prepare for comment (limit size for GitHub comment)
            REPORT=$(cat infrastructure-analysis-report.md | head -c 65000)
            echo "report_content=$(echo "$REPORT" | base64 -w 0)" >> $GITHUB_OUTPUT
          else
            echo "report_exists=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Post Summary Comment to PR
        if: github.event_name == 'pull_request' && steps.read_report.outputs.report_exists == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reportPath = 'infrastructure-analysis-report.md';
            if (!fs.existsSync(reportPath)) return;

            const report = fs.readFileSync(reportPath, 'utf8');
            const maxLength = 65000;
            const body = report.length > maxLength
              ? report.substring(0, maxLength) + '\n\n**[Report truncated — see artifacts for full details]**'
              : report;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Post Inline Review Comments to Files Changed
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const inlinePath = 'inline-comments.json';
            if (!fs.existsSync(inlinePath)) {
              console.log('No inline-comments.json — skipping.');
              return;
            }

            const comments = JSON.parse(fs.readFileSync(inlinePath, 'utf8'));
            if (!comments.length) { console.log('No inline comments.'); return; }

            // Files actually changed in this PR
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const changedPaths = new Set(files.map(f => f.filename));

            // Latest commit SHA on the PR branch
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const commitId = pr.head.sha;

            // patch line → diff position mapper
            const patchMap = Object.fromEntries(
              files.filter(f => f.patch).map(f => [f.filename, f.patch])
            );

            function getDiffPosition(patch, targetLine) {
              let diffPos = 0, newLine = 0;
              for (const l of patch.split('\n')) {
                diffPos++;
                if (l.startsWith('@@')) {
                  const m = l.match(/\+(\d+)/);
                  if (m) newLine = parseInt(m[1]) - 1;
                  continue;
                }
                if (!l.startsWith('-')) newLine++;
                if (newLine === targetLine && !l.startsWith('-')) return diffPos;
              }
              return null;
            }

            let posted = 0, skipped = 0;

            for (const c of comments) {
              let path = c.path;
              // normalise: try as-is, then strip leading dir segment
              if (!changedPaths.has(path)) {
                const bare = path.replace(/^[^/]+\//, '');
                if (changedPaths.has(bare)) path = bare;
                else { skipped++; continue; }
              }

              const position = getDiffPosition(patchMap[path] || '', c.line);
              if (!position) { skipped++; continue; }

              try {
                await github.rest.pulls.createReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  commit_id: commitId,
                  path,
                  position,
                  body: c.body,
                });
                posted++;
              } catch (err) {
                console.log(`  Skip ${path}:${c.line} — ${err.message}`);
                skipped++;
              }
            }
            console.log(`Inline comments: ${posted} posted, ${skipped} skipped.`);

      # ====================================================================
      # UPLOAD ARTIFACTS
      # ====================================================================
      
      - name: Upload Analysis Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-analysis-reports
          path: |
            checkov-output.json
            infracost-output.json
            infrastructure-analysis-report.md
            infrastructure-analysis-report.json
            infrastructure-analysis-summary.txt
            inline-comments.json
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## 📋 Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Checkov Security Analysis**" >> $GITHUB_STEP_SUMMARY
          echo "- Failed checks: ${{ steps.checkov.outputs.checkov_failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- Passed checks: ${{ steps.checkov.outputs.checkov_passed }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "💰 **Infracost Cost Analysis**" >> $GITHUB_STEP_SUMMARY
          echo "- Monthly cost estimate: \$${{ steps.infracost.outputs.infracost_total }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🧠 **AI-Powered Deep Analysis**" >> $GITHUB_STEP_SUMMARY
          if [ -f infrastructure-analysis-report.md ]; then
            echo "- ✓ Report generated successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠ Report generation skipped (check API key)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 **Artifacts**" >> $GITHUB_STEP_SUMMARY
          echo "- All reports available in workflow artifacts" >> $GITHUB_STEP_SUMMARY