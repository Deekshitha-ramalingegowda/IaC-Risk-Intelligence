name: Infrastructure Analysis & Risk Intelligence

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-pr-review.yaml'
  workflow_dispatch:

jobs:
  infrastructure-analysis:
    name: Security & Cost Analysis
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write   # needed to post PR comments and reviews
      contents: read         # needed to checkout code

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ====================================================================
      # SETUP
      # ====================================================================

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests

      - name: Install Checkov
        run: pip install checkov

      - name: Install Infracost
        run: |
          curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | bash || true
          infracost --version || echo "⚠ Infracost installation may have failed"

      # ====================================================================
      # SECURITY ANALYSIS - CHECKOV
      # Pre-run Checkov separately so we can show quick counts in the summary.
      # The Python script will also run Checkov internally.
      # ====================================================================

      - name: Run Checkov Security Analysis
        id: checkov
        run: |
          echo "🔍 Running Checkov security analysis..."
          checkov -d terraform/ --framework terraform -o json 2>&1 | tee checkov-output.json || true

          if ! jq empty checkov-output.json 2>/dev/null; then
            echo "⚠ Checkov output is not valid JSON — creating empty report"
            echo '{"results": {"failed_checks": [], "passed_checks": []}}' > checkov-output.json
          fi

          FAILED=$(jq '.results.failed_checks | length' checkov-output.json 2>/dev/null || echo "0")
          PASSED=$(jq '.results.passed_checks | length' checkov-output.json 2>/dev/null || echo "0")
          echo "checkov_failed=$FAILED" >> $GITHUB_OUTPUT
          echo "checkov_passed=$PASSED"  >> $GITHUB_OUTPUT
          echo "✓ Checkov complete — Failed: $FAILED | Passed: $PASSED"
        shell: bash

      # ====================================================================
      # COST ANALYSIS - INFRACOST
      # ====================================================================

      - name: Run Infracost Cost Analysis
        id: infracost
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
        run: |
          echo "💰 Running Infracost cost analysis..."

          if command -v infracost &> /dev/null && [ -n "$INFRACOST_API_KEY" ]; then
            infracost breakdown --path terraform/ --format json > infracost-output.json 2>&1 || true
            TOTAL_COST=$(jq '.totalMonthlyCost // "0"' infracost-output.json 2>/dev/null || echo "0")
          else
            echo "⚠ Infracost not available or API key missing — creating empty output"
            echo '{"totalMonthlyCost": 0, "projects": []}' > infracost-output.json
            TOTAL_COST="0"
          fi

          echo "infracost_total=$TOTAL_COST" >> $GITHUB_OUTPUT
          echo "✓ Infracost complete — Estimated monthly cost: \$$TOTAL_COST"
        shell: bash

      # ====================================================================
      # VALIDATE OUTPUT FILES
      # ====================================================================

      - name: Validate Analysis Files
        run: |
          if [ ! -f checkov-output.json ] || ! jq empty checkov-output.json 2>/dev/null; then
            echo '{"results": {"failed_checks": [], "passed_checks": []}}' > checkov-output.json
          fi
          if [ ! -f infracost-output.json ] || ! jq empty infracost-output.json 2>/dev/null; then
            echo '{"totalMonthlyCost": 0, "projects": []}' > infracost-output.json
          fi
          echo "✓ Files validated"
        shell: bash

      # ====================================================================
      # AI DEEP ANALYSIS + PR COMMENT + INLINE ANNOTATIONS
      # The Python script:
      #   1. Re-runs Checkov & Infracost internally
      #   2. Sends results to Gemini for AI analysis
      #   3. Posts a structured PR comment via GitHub API
      #   4. Posts inline review comments on the exact changed lines
      # ====================================================================

      - name: Run Deep Analysis & Post PR Feedback
        id: deep_analysis
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA:        ${{ github.sha }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          # Pass PR number — works for both pull_request events and manual triggers
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "🧠 Running AI-powered deep analysis..."

          if [ -z "$GEMINI_API_KEY" ]; then
            echo "❌ GEMINI_API_KEY not set — skipping AI analysis"
            echo "Add GEMINI_API_KEY to GitHub repository secrets."
            exit 0
          fi

          python scripts/local.py
          echo "✓ Deep analysis complete"
        shell: bash

      # ====================================================================
      # UPLOAD ARTIFACTS
      # ====================================================================

      - name: Upload Analysis Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-analysis-reports
          path: |
            checkov-output.json
            infracost-output.json
            infrastructure-analysis-report.md
            infrastructure-analysis-report.json
            infrastructure-analysis-summary.txt
          retention-days: 30

      # ====================================================================
      # WORKFLOW SUMMARY
      # ====================================================================

      - name: Workflow Summary
        if: always()
        run: |
          echo "## 📋 Infrastructure Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Checkov Failed | ${{ steps.checkov.outputs.checkov_failed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Checkov Passed | ${{ steps.checkov.outputs.checkov_passed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 💰 Monthly Cost Estimate | \$${{ steps.infracost.outputs.infracost_total }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f infrastructure-analysis-report.md ]; then
            echo "🧠 **AI Report:** ✓ Generated — see PR comment and artifacts" >> $GITHUB_STEP_SUMMARY
          else
            echo "🧠 **AI Report:** ⚠ Skipped — check GEMINI_API_KEY secret" >> $GITHUB_STEP_SUMMARY
          fi